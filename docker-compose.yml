services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-runbookiq}
      POSTGRES_USER: ${POSTGRES_USER:-runbookiq}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-runbookiq}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-runbookiq}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes
    volumes:
      - redisdata:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    env_file: .env
    environment:
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER:-runbookiq}:${POSTGRES_PASSWORD:-runbookiq}@postgres:5432/${POSTGRES_DB:-runbookiq}
      - REDIS_URL=redis://redis:6379/0
    volumes:
      - ./backend:/app
      - runbook_uploads:/app/uploads
      - ${HOME}/.kube:/root/.kube:ro
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: rq worker --with-scheduler --url redis://redis:6379/0 default high low
    env_file: .env
    environment:
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER:-runbookiq}:${POSTGRES_PASSWORD:-runbookiq}@postgres:5432/${POSTGRES_DB:-runbookiq}
      - REDIS_URL=redis://redis:6379/0
    volumes:
      - ./backend:/app
      - runbook_uploads:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: dev
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "5173:5173"
    environment:
      - VITE_API_URL=
      - API_PROXY_TARGET=http://api:8000
    depends_on:
      - api

volumes:
  pgdata:
  redisdata:
  runbook_uploads:
