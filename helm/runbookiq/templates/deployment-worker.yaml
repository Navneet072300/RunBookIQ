apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "runbookiq.fullname" . }}-worker
  labels:
    {{- include "runbookiq.labels" . | nindent 4 }}
    app.kubernetes.io/component: worker
spec:
  replicas: {{ .Values.worker.replicaCount }}
  selector:
    matchLabels:
      {{- include "runbookiq.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: worker
  template:
    metadata:
      labels:
        {{- include "runbookiq.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: worker
    spec:
      containers:
        - name: worker
          image: "{{ .Values.worker.image.repository }}:{{ .Values.worker.image.tag }}"
          imagePullPolicy: {{ .Values.worker.image.pullPolicy }}
          command:
            - rq
            - worker
            - --with-scheduler
            - --url
            - "$(REDIS_URL)"
            {{- range (split " " .Values.worker.queues) }}
            - {{ . | quote }}
            {{- end }}
          envFrom:
            - secretRef:
                name: {{ .Values.secrets.existingSecret }}
            - configMapRef:
                name: {{ include "runbookiq.fullname" . }}-config
          resources:
            {{- toYaml .Values.worker.resources | nindent 12 }}
          volumeMounts:
            - name: uploads
              mountPath: /app/uploads
      volumes:
        - name: uploads
          {{- if .Values.persistence.enabled }}
          persistentVolumeClaim:
            claimName: {{ include "runbookiq.fullname" . }}-uploads
          {{- else }}
          emptyDir: {}
          {{- end }}
