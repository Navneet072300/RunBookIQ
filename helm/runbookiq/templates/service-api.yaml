apiVersion: v1
kind: Service
metadata:
  name: {{ include "runbookiq.fullname" . }}-api
  labels:
    {{- include "runbookiq.labels" . | nindent 4 }}
    app.kubernetes.io/component: api
spec:
  type: {{ .Values.api.service.type }}
  ports:
    - port: {{ .Values.api.service.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "runbookiq.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: api
---
{{- if .Values.frontend.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "runbookiq.fullname" . }}-frontend
  labels:
    {{- include "runbookiq.labels" . | nindent 4 }}
    app.kubernetes.io/component: frontend
spec:
  type: {{ .Values.frontend.service.type }}
  ports:
    - port: {{ .Values.frontend.service.port }}
      targetPort: 80
      protocol: TCP
      name: http
  selector:
    {{- include "runbookiq.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: frontend
{{- end }}
